apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-v2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-v2
  template:
    metadata:
      labels:
        app: demo-v2
    spec:
      containers:
      - name: demo
        image: demo:v2
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: demo-v2
spec:
  selector:
    app: demo-v2
  ports:
  - port: 80
    targetPort: 80
