apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: demo-v1
spec:
  ingressClassName: nginx
  rules:
  - host: v1.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: demo-v1
            port:
              number: 80
